<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Negocio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Sistema para Negocios</h1>
    </header>

    <main>
      <!-- BUSCADOR -->
      <section id="buscador">
        <input
          type="text"
          id="searchInput"
          placeholder="Buscar artículo por nombre o código..."
          autocomplete="off"
        />
      </section>

      <button id="btnGestion" class="btn-secundario">Gestión de precios</button>
      <button id="btnAgregarProducto" class="btn-secundario">
        Agregar producto
      </button>

      <!-- GESTIÓN DE PRECIOS -->

      <section id="gestion" class="oculto">
        <h2>Gestión de precios</h2>

        <div class="campo">
          <label for="gananciaGlobalInput">Ganancia global (%)</label>
          <input type="number" id="gananciaGlobalInput" min="0" />
        </div>

        <div class="acciones">
          <button id="aplicarGlobal" class="btn-primario">Aplicar</button>
          <button id="cerrarGlobal" class="btn-primario">Cerrar</button>
        </div>
      </section>

      <!-- EDITOR DE PRODUCTOS -->

      <section id="editorProducto" class="overlay oculto">
        <div class="editor-contenido">
          <button id="cerrarEditor" class="editor-cerrar">✕</button>

          <h2>Editar producto</h2>

          <p id="productoEditando" class="producto-editando"></p>

          <div class="campo">
            <label>Nombre</label>
            <input type="text" id="editNombre" />
          </div>

          <div class="campo">
            <label>Código</label>
            <input type="text" id="editCodigo" />
          </div>

          <div class="campo">
            <label>Categoría</label>
            <select id="editCategoria" required>
              <option value="Libreria">Librería</option>
              <option value="carteras">Carteras</option>
              <option value="juguetes">Juguetes</option>
              <option value="otros">Otros</option>
            </select>
          </div>

          <div class="campo">
            <label>Costo</label>
            <input type="number" id="editCosto" min="0" />
          </div>

          <div class="campo">
            <label>Ganancia especial (%)</label>
            <input
              type="number"
              id="editGanancia"
              min="0"
              placeholder="Vacío = usa ganancia global"
            />
          </div>

          <div class="acciones">
            <button id="cancelarEdicion" class="btn-secundario">
              Cancelar
            </button>

            <button id="guardarProducto" class="btn-primario">
              Guardar cambios
            </button>
          </div>
        </div>
      </section>

      <!-- BANNER DE GANANCIA -->
      <div id="bannerGanancia" class="banner oculto">
        <span> Margen de ganancia aplicado </span>
        <button id="cerrarBanner" class="banner-cerrar">✕</button>
      </div>

      <!-- OVERLAY DE CONFIRMACIÓN -->
      <section id="overlayConfirmacion" class="overlay oculto">
        <div class="editor-contenido">
          <h2 id="confirmacionTitulo">Confirmar acción</h2>
          <p id="confirmacionTexto"></p>

          <div class="acciones">
            <button id="cancelarConfirmacion" class="btn-secundario">
              Cancelar
            </button>
            <button id="confirmarAccion" class="btn-primario">Confirmar</button>
          </div>
        </div>
      </section>

      <!-- LISTA DE ARTÍCULOS -->
      <section id="lista-articulos">
        <ul id="productList">
          <!-- Los productos se insertan acá desde script.js -->
        </ul>
      </section>
    </main>

    <!-- JS principal -->
    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
